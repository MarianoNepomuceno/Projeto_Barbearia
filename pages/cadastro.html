<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Cliente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <nav class="nav-links">
    <a href="../pages/login.html">Login</a>
    <a href="../pages/cadastro.html" class="ativo">Cadastro</a>
  </nav>

  <div class="painel auth-painel">
    <h1>Criar Conta</h1>
    <p class="auth-subtitulo">Cadastre-se para fazer agendamentos online.</p>

    <form id="formCadastro" class="formulario">
      <input type="text" id="nome" placeholder="Nome completo" required>
      <input type="email" id="email" placeholder="E-mail" required>
      <input type="tel" id="telefone" placeholder="WhatsApp (ex: 99 9xxxx-xxxx)" required>
      <input type="password" id="senha" placeholder="Senha (mínimo 6 caracteres)" minlength="6" required>
      <input type="password" id="confirmarSenha" placeholder="Confirmar senha" minlength="6" required>
      <button type="submit">Cadastrar</button>
    </form>

    <div id="mensagem" class="mensagem"></div>

    <!--<p class="auth-link">
      Já tem conta? <a href="../pages/login.html">Faça login</a>
    </p>-->
  </div>

  <script src="../assets/js/auth.js"></script>
  <script>
    const form = document.getElementById("formCadastro");
    const mensagem = document.getElementById("mensagem");

    getCurrentUser().then((usuario) => {
      if (usuario?.tipo === "cliente") {
        window.location.href = redirectByTipo("cliente");
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      try {
        await apiRequest("auth/register.php", {
          method: "POST",
          body: JSON.stringify({
            nome: document.getElementById("nome").value.trim(),
            email: document.getElementById("email").value.trim(),
            telefone: document.getElementById("telefone").value.trim(),
            senha: document.getElementById("senha").value,
            confirmar_senha: document.getElementById("confirmarSenha").value,
          }),
        });

        window.location.href = redirectByTipo("cliente");
      } catch (error) {
        mostrarMensagemAuth(mensagem, error.message, "erro");
      }
    });
  </script>
</body>
</html>
