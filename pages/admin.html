<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel do Barbeiro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <nav class="nav-links">
    <a href="../pages/admin.html" class="ativo">Painel</a>
    <button type="button" id="btnLogout" class="nav-button">Sair</button>
  </nav>

  <h1>Barbeiro</h1>
  <p id="adminInfo" class="auth-subtitulo"></p>

  <section class="painel">
    <h2>Valores dos Serviços</h2>

    <div class="precos">
      <label>Degradê:
        <input type="number" id="precoDegrade" min="0" step="0.01">
      </label>

      <label>Social:
        <input type="number" id="precoSocial" min="0" step="0.01">
      </label>

      <label>Tesoura:
        <input type="number" id="precoTesoura" min="0" step="0.01">
      </label>

      <label>Barba:
        <input type="number" id="precoBarba" min="0" step="0.01">
      </label>

      <label>Sobrancelha:
        <input type="number" id="precoSobrancelha" min="0" step="0.01">
      </label>

      <button type="button" onclick="salvarPrecos()">Salvar Preços</button>
    </div>
  </section>

  <section class="painel">
    <h2>Bloquear Horário</h2>

    <label>Data</label>
    <input type="date" id="bloqueioData">

    <label>Horário</label>
    <select id="bloqueioHora"></select>

    <button type="button" onclick="bloquearHorario()">Bloquear</button>
  </section>

  <section class="painel">
    <h2>Clientes Cadastrados</h2>
    <ul id="listaClientes" class="lista-admin"></ul>
  </section>

  <section class="painel">
    <h2>Agenda</h2>
    <ul id="listaAgendamentos" class="lista-admin"></ul>
  </section>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
